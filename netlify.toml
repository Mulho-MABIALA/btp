[build]
  command = "npm run build"
  publish = "dist"

# ── Proxy API vers Render (évite les problèmes CORS) ─────────────────────────
[[redirects]]
  from = "/api/*"
  to = "https://btp-jpue.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://btp-jpue.onrender.com/uploads/:splat"
  status = 200
  force = true

# ── SPA fallback (React Router) ───────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
